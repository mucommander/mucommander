dependencies {
    api project(':mucommander-commons-file')
    api project(':mucommander-protocol-api')
    api project(':mucommander-encoding')
    api project(':mucommander-translator')

//    implementation 'com.google.guava:guava:29.0-jre'
//    implementation group: 'com.microsoft.graph', name: 'microsoft-graph', version: '3.5.0'
//    implementation group: 'org.apache.servicemix.bundles', name: 'org.apache.servicemix.bundles.okhttp', version: '4.9.0_1'
    //implementation 'com.azure:azure-identity:1.+'
//    implementation 'com.microsoft.azure:msal4j:1.10.1'
//    implementation 'com.azure:azure-identity:1.+'
//    implementation group: 'net.jcip', name: 'jcip-annotations', version: '1.0'
//    implementation group: 'org.jetbrains.kotlin', name: 'kotlin-osgi-bundle', version: '1.5.20'
    implementation files('libs/graph.jar')
    
    //comprise 'com.microsoft.graph:microsoft-graph:3.9.0'

    implementation 'org.slf4j:slf4j-api:1.7.26'
    implementation 'org.osgi:osgi.core:7.0.0'

    testImplementation 'junit:junit:4.12'

    testImplementation 'org.testng:testng:6.11'
}

repositories.mavenCentral()

jar {
   from configurations.comprise.collect { it.isDirectory() ? it : zipTree(it).matching {
        exclude 'META-INF/**'
   } }
   bnd ('Bundle-Name': 'muCommander-onedrive',
        'Bundle-Vendor': 'muCommander',
        'Bundle-Description': 'Plugin for OneDrive',
        'Bundle-DocURL': 'https://www.mucommander.com',
        'Export-Package': 'com.mucommander.commons.protocol.onedrive',
        'Import-Package': 'com.microsoft.graph.options,' +
                          'com.microsoft.graph.authentication,*',
        'Bundle-Activator': 'com.mucommander.commons.file.protocol.onedrive.Activator',
        'Specification-Title': "muCommander",
        'Specification-Vendor': "Arik Hadas",
        'Specification-Version': project.version+'-'+project.ext.release,
        'Implementation-Title': "muCommander",
        'Implementation-Vendor': "Arik Hadas",
        'Implementation-Version': revision.substring(0, 7),
        'Build-Date': new Date().format('yyyyMMdd'),
        'Build-Url': "https://www.mucommander.com/version/nightly.xml")
}
